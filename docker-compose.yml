version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: brain-mri-backend
    volumes:
      - ./:/app
    working_dir: /app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: brain-mri-frontend
    working_dir: /app/frontend
    volumes:
      - ./:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
