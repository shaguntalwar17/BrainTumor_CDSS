{% extends "base.html" %}

{% block content %}
<section class="glass-card">
  <div class="section-head">
    <h2>Patient History</h2>
    <p>Search patients and review longitudinal MRI scan timelines.</p>
  </div>

  <div class="row g-3 align-items-end">
    <div class="col-lg-4">
      <label class="form-label" for="patientSelect">Available Patients</label>
      <select id="patientSelect" class="form-select form-select-lg">
        <option value="">Loading...</option>
      </select>
    </div>
    <div class="col-lg-5">
      <label class="form-label" for="patientIdInput">Or enter Patient ID</label>
      <input id="patientIdInput" class="form-control form-control-lg" placeholder="PAT-2026-0001" />
    </div>
    <div class="col-lg-3 d-grid">
      <button id="loadHistoryBtn" class="btn btn-cyan btn-lg">Load History</button>
    </div>
  </div>
</section>

<section class="row g-4 mt-1" id="historySection" hidden>
  <div class="col-12">
    <article class="glass-card">
      <div id="patientSummary" class="result-meta-grid"></div>
      <div class="timeline-wrap mt-3" id="historyTimeline"></div>
    </article>
  </div>
</section>

<section class="mt-3" id="historyMessage" hidden>
  <div class="alert alert-warning"></div>
</section>
{% endblock %}
